<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flowers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(#020617,#04142a);
display:flex;
justify-content:center;
align-items:flex-end;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:120px 120px;
opacity:0.5;
}

.flower{
position:absolute;
bottom:80px;
width:6px;
height:140px;
background:#59ffb3;
box-shadow:0 0 10px #59ffb3;
animation:grow 3s ease forwards;
}

@keyframes grow{
from{height:0}
to{height:140px}
}

.petal{
position:absolute;
width:40px;
height:40px;
background:#b7ffff;
border-radius:50%;
filter:blur(1px);
box-shadow:0 0 20px #a7ffff;
}

.p1{top:-20px;left:-17px}
.p2{top:-8px;left:-30px}
.p3{top:-8px;left:5px}
.p4{top:-30px;left:-17px}

.leaf{
position:absolute;
width:30px;
height:15px;
background:#3cff95;
border-radius:50%;
box-shadow:0 0 10px #3cff95;
}

.l1{top:40px;left:-25px;transform:rotate(-30deg)}
.l2{top:60px;left:5px;transform:rotate(30deg)}

.grass{
position:absolute;
bottom:0;
width:4px;
height:70px;
background:#4cff88;
box-shadow:0 0 10px #4cff88;
}

.grass:nth-child(1){left:10%}
.grass:nth-child(2){left:20%;height:90px}
.grass:nth-child(3){left:30%}
.grass:nth-child(4){left:70%;height:85px}
.grass:nth-child(5){left:80%}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(0);opacity:1}
to{transform:translateY(-100vh);opacity:0}
}

.butterfly{
position:absolute;
font-size:22px;
animation:fly 12s linear infinite;
}

@keyframes fly{
0%{transform:translate(-10vw,80vh)}
50%{transform:translate(50vw,40vh)}
100%{transform:translate(110vw,20vh)}
}

</style>
</head>

<body>

<div class="stars"></div>

<!-- grass -->

<div class="grass"></div>
<div class="grass"></div>
<div class="grass"></div>
<div class="grass"></div>
<div class="grass"></div>

<!-- flower -->

<div class="flower">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>

<div class="leaf l1"></div>
<div class="leaf l2"></div>

</div>

<!-- hearts -->

<div class="heart" style="left:20%">💖</div>
<div class="heart" style="left:40%;animation-delay:2s">💖</div>
<div class="heart" style="left:60%;animation-delay:4s">💖</div>
<div class="heart" style="left:80%;animation-delay:1s">💖</div>

<!-- butterflies -->

<div class="butterfly">🦋</div>
<div class="butterfly" style="animation-delay:5s">🦋</div>

</body>
</html>
