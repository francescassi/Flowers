<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowing Flowers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(30, 120, 150, 0.18), transparent 30%),
        radial-gradient(circle at 50% 70%, rgba(0, 30, 50, 0.45), transparent 45%),
        linear-gradient(to bottom, #040814 0%, #071120 45%, #03070f 100%);
      font-family: Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .stars,
    .particles,
    .glow-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.7) 1px, transparent 1.6px),
        radial-gradient(circle, rgba(170,230,255,.7) 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,255,255,.45) 1px, transparent 1.4px);
      background-size: 140px 140px, 190px 190px, 240px 240px;
      background-position: 0 0, 40px 80px, 90px 30px;
      opacity: .35;
    }

    .glow-bg {
      background:
        radial-gradient(circle at 50% 48%, rgba(125, 255, 255, 0.12), transparent 16%),
        radial-gradient(circle at 50% 56%, rgba(80, 220, 255, 0.10), transparent 25%);
      filter: blur(10px);
    }

    .garden {
      position: absolute;
      left: 50%;
      bottom: 40px;
      width: 640px;
      height: 520px;
      transform: translateX(-50%);
    }

    .plant {
      position: absolute;
      inset: 0;
    }

    .stem {
      position: absolute;
      bottom: 70px;
      width: 6px;
      border-radius: 999px;
      transform-origin: bottom center;
      animation: growStem 1.8s ease forwards;
      transform: scaleY(0);
      background: linear-gradient(to top, #62e6ef, #b7fff9);
      box-shadow: 0 0 8px rgba(110, 255, 240, 0.45);
    }

    .stem.s1 { left: 245px; height: 175px; --r: -18deg; animation-delay: .15s; }
    .stem.s2 { left: 295px; height: 220px; --r: -6deg;  animation-delay: .35s; }
    .stem.s3 { left: 340px; height: 260px; --r: 0deg;   animation-delay: .55s; }
    .stem.s4 { left: 390px; height: 205px; --r: 12deg;  animation-delay: .75s; }

    @keyframes growStem {
      from {
        transform: rotate(var(--r)) scaleY(0);
      }
      to {
        transform: rotate(var(--r)) scaleY(1);
      }
    }

    .leaf {
      position: absolute;
      width: 52px;
      height: 24px;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(to right, #53dff0, #9afcff);
      box-shadow:
        0 0 10px rgba(100, 255, 245, 0.4),
        0 0 20px rgba(80, 210, 255, 0.18);
      opacity: 0;
      animation: leafShow .8s ease forwards;
      transform-origin: center;
    }

    @keyframes leafShow {
      from {
        opacity: 0;
        transform: scale(.2) rotate(var(--rot));
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(var(--rot));
      }
    }

    .l1 { left: 252px; bottom: 205px; --rot: -38deg; animation-delay: 1.1s; }
    .l2 { left: 278px; bottom: 250px; --rot: 28deg; animation-delay: 1.25s; transform: scaleX(-1); }
    .l3 { left: 314px; bottom: 175px; --rot: -30deg; animation-delay: 1.35s; }
    .l4 { left: 330px; bottom: 235px; --rot: 34deg; animation-delay: 1.55s; transform: scaleX(-1); }
    .l5 { left: 354px; bottom: 185px; --rot: -28deg; animation-delay: 1.7s; }
    .l6 { left: 378px; bottom: 248px; --rot: 28deg; animation-delay: 1.85s; transform: scaleX(-1); }
    .l7 { left: 300px; bottom: 135px; --rot: 24deg; animation-delay: 2s; }
    .l8 { left: 360px; bottom: 130px; --rot: -26deg; animation-delay: 2.15s; }

    .flower {
      position: absolute;
      width: 92px;
      height: 78px;
      opacity: 0;
      transform: translateY(25px) scale(.2);
      animation: bloom 1s ease forwards;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.85))
              drop-shadow(0 0 18px rgba(170,255,250,0.5))
              drop-shadow(0 0 34px rgba(120,240,255,0.28));
    }

    .f1 { left: 208px; bottom: 220px; animation-delay: 1.35s; }
    .f2 { left: 260px; bottom: 285px; animation-delay: 1.7s; }
    .f3 { left: 312px; bottom: 330px; animation-delay: 2.05s; }
    .f4 { left: 368px; bottom: 265px; animation-delay: 2.4s; }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform: translateY(25px) scale(.2);
      }
      70% {
        opacity: 1;
        transform: translateY(0) scale(1.08);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .petal {
      position: absolute;
      background: radial-gradient(circle at 50% 40%, #ffffff 0%, #f8ffff 62%, #dfffff 100%);
      box-shadow: inset 0 -6px 10px rgba(210,255,255,0.35);
    }

    .petal.left {
      width: 34px;
      height: 28px;
      left: 8px;
      top: 25px;
      border-radius: 80% 20% 85% 20%;
      transform: rotate(-25deg);
    }

    .petal.mid {
      width: 38px;
      height: 36px;
      left: 27px;
      top: 10px;
      border-radius: 50% 50% 40% 40%;
    }

    .petal.right {
      width: 34px;
      height: 28px;
      right: 8px;
      top: 25px;
      border-radius: 20% 80% 20% 85%;
      transform: rotate(25deg);
    }

    .flower-center {
      position: absolute;
      left: 50%;
      top: 38px;
      width: 16px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      filter: blur(1px);
    }

    .bush {
      position: absolute;
      bottom: 55px;
      left: 50%;
      width: 250px;
      height: 140px;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 10px rgba(60,220,255,0.2));
    }

    .bush-leaf {
      position: absolute;
      width: 46px;
      height: 72px;
      background: radial-gradient(circle at 50% 30%, #67ebff, #1d96b8 75%);
      border-radius: 50% 50% 45% 45%;
      opacity: 0;
      animation: popLeaf .9s ease forwards;
    }

    @keyframes popLeaf {
      from {
        opacity: 0;
        transform: translateY(10px) scale(.3);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .b1 { left: 20px;  bottom: 10px; transform: rotate(-28deg); animation-delay: 1s; }
    .b2 { left: 52px;  bottom: 28px; transform: rotate(-12deg); animation-delay: 1.15s; }
    .b3 { left: 84px;  bottom: 6px;  transform: rotate(6deg);   animation-delay: 1.3s; }
    .b4 { left: 114px; bottom: 32px; transform: rotate(14deg);  animation-delay: 1.45s; }
    .b5 { left: 148px; bottom: 10px; transform: rotate(-10deg); animation-delay: 1.6s; }
    .b6 { left: 180px; bottom: 28px; transform: rotate(18deg);  animation-delay: 1.75s; }

    .grass {
      position: absolute;
      bottom: 40px;
      width: 130px;
      height: 180px;
    }

    .grass.left { left: 120px; }
    .grass.right { right: 120px; transform: scaleX(-1); }

    .blade {
      position: absolute;
      bottom: 0;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(to top, #1d8f4c, #7dff8f);
      box-shadow: 0 0 10px rgba(110,255,160,0.2);
      transform-origin: bottom center;
      animation: bladeGrow 1.4s ease forwards;
      transform: scaleY(0) rotate(var(--rot));
    }

    @keyframes bladeGrow {
      to {
        transform: scaleY(1) rotate(var(--rot));
      }
    }

    .g1 { height: 130px; left: 10px;  --rot: -18deg; animation-delay: .3s; }
    .g2 { height: 95px;  left: 34px;  --rot: -34deg; animation-delay: .5s; }
    .g3 { height: 160px; left: 60px;  --rot: 2deg;   animation-delay: .7s; }
    .g4 { height: 85px;  left: 85px;  --rot: 28deg;  animation-delay: .9s; }
    .g5 { height: 120px; left: 104px; --rot: 24deg;  animation-delay: 1.1s; }

    .particle {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9dffff;
      box-shadow:
        0 0 8px rgba(157,255,255,0.95),
        0 0 18px rgba(157,255,255,0.45);
      animation: floatParticle linear infinite;
      opacity: .8;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) scale(.7);
        opacity: 0;
      }
      20% {
        opacity: .9;
      }
      100% {
        transform: translateY(-140px) translateX(var(--dx)) scale(1.15);
        opacity: 0;
      }
    }

    .ground-glow {
      position: absolute;
      left: 50%;
      bottom: 25px;
      width: 360px;
      height: 90px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(90,255,250,0.16), transparent 70%);
      filter: blur(12px);
    }

    @media (max-width: 800px) {
      .garden {
        transform: translateX(-50%) scale(.8);
        transform-origin: bottom center;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>
    <div class="glow-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="garden">
      <div class="ground-glow"></div>

      <div class="grass left">
        <div class="blade g1"></div>
        <div class="blade g2"></div>
        <div class="blade g3"></div>
        <div class="blade g4"></div>
        <div class="blade g5"></div>
      </div>

      <div class="grass right">
        <div class="blade g1"></div>
        <div class="blade g2"></div>
        <div class="blade g3"></div>
        <div class="blade g4"></div>
        <div class="blade g5"></div>
      </div>

      <div class="plant">
        <div class="stem s1"></div>
        <div class="stem s2"></div>
        <div class="stem s3"></div>
        <div class="stem s4"></div>

        <div class="leaf l1"></div>
        <div class="leaf l2"></div>
        <div class="leaf l3"></div>
        <div class="leaf l4"></div>
        <div class="leaf l5"></div>
        <div class="leaf l6"></div>
        <div class="leaf l7"></div>
        <div class="leaf l8"></div>

        <div class="bush">
          <div class="bush-leaf b1"></div>
          <div class="bush-leaf b2"></div>
          <div class="bush-leaf b3"></div>
          <div class="bush-leaf b4"></div>
          <div class="bush-leaf b5"></div>
          <div class="bush-leaf b6"></div>
        </div>

        <div class="flower f1">
          <div class="petal left"></div>
          <div class="petal mid"></div>
          <div class="petal right"></div>
          <div class="flower-center"></div>
        </div>

        <div class="flower f2">
          <div class="petal left"></div>
          <div class="petal mid"></div>
          <div class="petal right"></div>
          <div class="flower-center"></div>
        </div>

        <div class="flower f3">
          <div class="petal left"></div>
          <div class="petal mid"></div>
          <div class="petal right"></div>
          <div class="flower-center"></div>
        </div>

        <div class="flower f4">
          <div class="petal left"></div>
          <div class="petal mid"></div>
          <div class="petal right"></div>
          <div class="flower-center"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const particles = document.getElementById("particles");

    function makeParticle(x, y, delay, duration, size, dx) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = x + "px";
      p.style.top = y + "px";
      p.style.width = size + "px";
      p.style.height = size + "px";
      p.style.setProperty("--dx", dx + "px");
      p.style.animationDuration = duration + "s";
      p.style.animationDelay = delay + "s";
      particles.appendChild(p);
    }

    const baseX = window.innerWidth / 2;
    const baseY = window.innerHeight * 0.58;

    for (let i = 0; i < 18; i++) {
      makeParticle(
        baseX + (Math.random() * 180 - 90),
        baseY + (Math.random() * 80 - 40),
        Math.random() * 4,
        3 + Math.random() * 3,
        4 + Math.random() * 4,
        Math.random() * 70 - 35
      );
    }
  </script>
</body>
</html>
